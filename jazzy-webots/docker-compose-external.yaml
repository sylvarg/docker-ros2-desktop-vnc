services:
  ros-desktop-vnc-jazzy:
    build:
      args:
        # Build a Linux container that includes ROS 2 + webots_ros2 but expects
        # the Webots GUI/simulator to run natively on the host OS.
        WEBOTS_BACKEND: external
    image: ros2-desktop-vnc:jazzy-webots-external
    container_name: ros2_desktop_vnc_jazzy_external
    shm_size: "512m"
    ports:
      - "6080:6080"
    environment:
      TZ: "${TZ:-Europe/Paris}"
      VNC_NO_PASSWORD: "true"
      WEBOTS_BACKEND: "external"
      # The upstream shared-folder workflow expects WEBOTS_SHARED_FOLDER in the
      # form:
      #   <host shared path>:<guest shared path>
      # Docker mounts the host directory at the container path below so
      # webots_ros2 can exchange worlds/resources with the host Webots process.
      WEBOTS_SHARED_FOLDER: "${WEBOTS_SHARED_HOST_DIR:-/tmp/ros2-desktop-vnc-webots-shared}:${CONTAINER_WEBOTS_SHARED_DIR:-/home/turtle/webots_shared}"
    hostname: remotepc
    extra_hosts:
      - "remotepc:127.0.0.1"
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${WEBOTS_SHARED_HOST_DIR:-/tmp/ros2-desktop-vnc-webots-shared}
        target: ${CONTAINER_WEBOTS_SHARED_DIR:-/home/turtle/webots_shared}
